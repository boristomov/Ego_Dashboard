name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      include_thumbs:
        description: "Download thumbnails into the bundle"
        type: boolean
        required: false
        default: true
      force_full_snapshot:
        description: "Ignore the thumb cache and re-download every thumbnail"
        type: boolean
        required: false
        default: false
  schedule:
    # Every 5 minutes — minimum cron granularity on GitHub Actions. Cheap on
    # public repos (unlimited minutes) thanks to the thumbnail cache.
    - cron: "*/5 * * * *"

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Cache thumbnails between runs so the 5-min cadence is cheap. The key
      # changes daily so we still refresh anything that drifted out of sync.
      - name: Restore thumb cache
        if: ${{ github.event.inputs.force_full_snapshot != 'true' }}
        uses: actions/cache@v4
        with:
          path: public/thumbs
          key: ego-thumbs-v1-${{ github.run_id }}
          restore-keys: |
            ego-thumbs-v1-

      - name: Snapshot S3 → public/
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
          S3_RAW_BUCKET: ${{ vars.S3_RAW_BUCKET || 'ego-raw-prod-886989006633-ap-southeast-1-an' }}
          S3_PROCESSED_BUCKET: ${{ vars.S3_PROCESSED_BUCKET || 'ego-processed-prod-886989006633-ap-southeast-1-an' }}
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "::warning::AWS_ACCESS_KEY_ID secret is not set; skipping snapshot."
            mkdir -p public
            echo '{"sessions":[],"count":0}' > public/catalogue.json
            echo '{"generatedAt":"'"$(date -u +%FT%TZ)"'","sessionCount":0,"taskCount":0,"thumbs":{"included":false},"note":"AWS secrets not configured"}' > public/snapshot-meta.json
          else
            FLAGS=""
            if [ "${{ github.event.inputs.include_thumbs }}" = "false" ]; then
              FLAGS="$FLAGS --no-thumbs"
            fi
            if [ "${{ github.event.inputs.force_full_snapshot }}" != "true" ]; then
              FLAGS="$FLAGS --use-existing-thumbs"
            fi
            node scripts/snapshot.mjs $FLAGS
          fi

      # Poll the Vast.ai postprocessing fleet over SSH so the dashboard knows
      # what each box is doing. Only runs if VAST_SSH_PRIVATE_KEY is set.
      - name: Poll Vast.ai instances over SSH
        env:
          VAST_SSH_PRIVATE_KEY: ${{ secrets.VAST_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${VAST_SSH_PRIVATE_KEY:-}" ]; then
            echo "::warning::VAST_SSH_PRIVATE_KEY secret is not set; writing empty instances.json."
            mkdir -p public
            echo '{"generatedAt":"'"$(date -u +%FT%TZ)"'","instances":[]}' > public/instances.json
          else
            mkdir -p ~/.ssh
            printf '%s\n' "$VAST_SSH_PRIVATE_KEY" > ~/.ssh/vast_instance_1
            chmod 600 ~/.ssh/vast_instance_1
            SSH_KEY=~/.ssh/vast_instance_1 node scripts/poll-instances.mjs
            shred -u ~/.ssh/vast_instance_1 || rm -f ~/.ssh/vast_instance_1
          fi

      - name: Build site
        env:
          VITE_DATA_SOURCE: static
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          # Lead capture writes to client-data-access via a Cognito guest
          # identity pool (see infra/lead-capture). These are non-secret and
          # default to the live pool in src/lib/lead.ts; override here only if
          # the pool/region/bucket change.
          VITE_LEADS_POOL_ID: ${{ vars.VITE_LEADS_POOL_ID }}
          VITE_LEADS_REGION: ${{ vars.VITE_LEADS_REGION }}
          VITE_LEADS_BUCKET: ${{ vars.VITE_LEADS_BUCKET }}
          # CAPTCHA (Cloudflare Turnstile + Worker verifier, infra/captcha).
          # Both unset → the access gate runs without a captcha; set both repo
          # variables to activate it. Non-secret values.
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
          VITE_CAPTCHA_ENDPOINT: ${{ vars.VITE_CAPTCHA_ENDPOINT }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
